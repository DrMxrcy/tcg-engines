name: Publish to npm

on:
  push:
    branches: ["main"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      # Lorcana-focused publish set
      PUBLISH_WORKSPACES: >-
        @drmxrcy/tcg-core
        @drmxrcy/tcg-core-types
        @drmxrcy/tcg-shared
        @drmxrcy/tcg-config
        @drmxrcy/tcg-lorcana
        @drmxrcy/tcg-lorcana-types
        @drmxrcy/tcg-lorcana-cards
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.18"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: "[DrMxrcy] Install deps"
        run: bun install

      - name: "[DrMxrcy] Bump versions (timestamp) and resolve workspace deps"
        run: |
          TS=$(date -u +"%Y%m%d%H%M")
          TS="$TS" node .github/scripts/bump-versions.js

      - name: "[DrMxrcy] Publish selected workspaces (token)"
        if: ${{ env.NPM_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for w in $PUBLISH_WORKSPACES; do
            npm publish --access public --tag next --workspace "$w"
          done

      - name: "[DrMxrcy] Publish selected workspaces (trusted publishing)"
        if: ${{ env.NPM_TOKEN == '' }}
        run: |
          for w in $PUBLISH_WORKSPACES; do
            npm publish --access public --tag next --workspace "$w"
          done
