name: Sync Upstream

on:
  schedule:
    - cron: "0 * * * *" # hourly
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: "[DrMxrcy] Configure git"
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
      - name: "[DrMxrcy] Add upstream"
        run: |
          git remote add upstream https://github.com/TheCardGoat/tcg-engines.git || true
          git fetch upstream
      - name: "[DrMxrcy] Sync main"
        run: |
          git checkout main
          git merge upstream/main
      - name: "[DrMxrcy] Enforce @drmxrcy/tcg-* package scope"
        run: |
          node -e "const fs=require('fs'); const path=require('path'); \
          const workspaces=JSON.parse(fs.readFileSync('package.json','utf8')).workspaces||[]; \
          const globs=workspaces.map(p=>p.replace('/*','')); \
          const dirs=globs.filter(Boolean); \
          const walk=(dir)=>fs.existsSync(dir)?fs.readdirSync(dir).map(f=>path.join(dir,f)).filter(p=>fs.existsSync(path.join(p,'package.json'))):[]; \
          const pkgPaths=dirs.flatMap(walk); \
          const nameMap={}; \
          for (const p of pkgPaths){ \
            const j=JSON.parse(fs.readFileSync(path.join(p,'package.json'),'utf8')); \
            if(!j.name) continue; \
            const suffix=j.name.startsWith('@') && j.name.includes('/') ? j.name.split('/',2)[1] : j.name; \
            const prefixed=suffix.startsWith('tcg-') ? suffix : `tcg-${suffix}`; \
            nameMap[j.name]=`@drmxrcy/${prefixed}`; \
          } \
          for (const p of pkgPaths){ \
            const file=path.join(p,'package.json'); \
            const j=JSON.parse(fs.readFileSync(file,'utf8')); \
            if(j.name && nameMap[j.name]) j.name=nameMap[j.name]; \
            j.private=false; \
            for (const key of ['dependencies','devDependencies','peerDependencies','optionalDependencies']){ \
              const deps=j[key]; \
              if(!deps) continue; \
              const out={}; \
              for (const [k,v] of Object.entries(deps)){ \
                out[nameMap[k]||k]=v; \
              } \
              j[key]=out; \
            } \
            fs.writeFileSync(file, JSON.stringify(j,null,2)); \
          } \
          const root=JSON.parse(fs.readFileSync('package.json','utf8')); \
          for (const key of ['dependencies','devDependencies','peerDependencies','optionalDependencies']){ \
            const deps=root[key]; \
            if(!deps) continue; \
            const out={}; \
            for (const [k,v] of Object.entries(deps)){ \
              out[nameMap[k]||k]=v; \
            } \
            root[key]=out; \
          } \
          fs.writeFileSync('package.json', JSON.stringify(root,null,2));"
      - name: "[DrMxrcy] Commit scope updates (if any)"
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore: enforce drmxrcy package scope"
          fi
      - name: "[DrMxrcy] Push"
        run: git push origin main
